<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수행평가 달력</title>
    <style>
        :root { --bg-color: #f4f7f6; --card-bg: #ffffff; --primary-color: #4a90e2; --accent-color: #e74c3c; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; }
        .calendar-container { background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px; }
        
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .calendar-header h1 { font-size: 1.5rem; color: #333; margin: 0; }
        .calendar-header button { background: var(--bg-color); border: none; font-size: 1.2rem; cursor: pointer; color: var(--primary-color); padding: 5px 15px; border-radius: 8px; font-weight: bold; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-name { text-align: center; font-weight: bold; font-size: 0.8rem; color: #888; padding-bottom: 10px; }
        
        .day { background: #fff; border: 1px solid #eee; min-height: 85px; padding: 5px; border-radius: 5px; display: flex; flex-direction: column; cursor: pointer; transition: 0.2s; }
        .day:hover { background: #f9f9f9; border-color: #ccc; }
        .day.empty { background: transparent; border: none; cursor: default; } 
        .day.today { background: #eef5ff; border: 2px solid var(--primary-color); }
        .day-number { font-size: 0.9rem; font-weight: bold; color: #555; pointer-events: none; margin-bottom: 5px; }

        /* ✨ 수행평가 일정 스타일 업그레이드 ✨ */
        .event { 
            background-color: #4a90e2; color: white; border-radius: 4px; padding: 4px; margin-bottom: 3px;
            display: flex; flex-direction: column; gap: 4px; /* 글자와 버튼 위아래 배치 */
        }
        .event-text { font-size: 0.75rem; font-weight: bold; word-break: keep-all; line-height: 1.2; text-align: center; }
        
        /* 버튼들을 담는 상자 */
        .event-buttons { display: flex; justify-content: center; gap: 3px; }
        
        /* 수정, 삭제 버튼 디자인 */
        .action-btn { 
            background: rgba(255, 255, 255, 0.25); border: none; color: white; 
            border-radius: 3px; font-size: 0.65rem; padding: 2px 6px; cursor: pointer; 
        }
        .action-btn:hover { background: rgba(255, 255, 255, 0.5); }

        .day-name:nth-child(1) { color: #e74c3c; } 
        .day-name:nth-child(7) { color: #4a90e2; } 
    </style>
</head>
<body>

<div class="calendar-container">
    <div class="calendar-header">
        <button id="prevBtn">◀</button>
        <h1 id="monthYear">📅 년 월</h1>
        <button id="nextBtn">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<script>
    const monthYearText = document.getElementById('monthYear');
    const calendarGrid = document.getElementById('calendarGrid');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    let currentDate = new Date(); 
    let savedEvents = JSON.parse(localStorage.getItem('myEvents')) || {};

    function renderCalendar(date) {
        const year = date.getFullYear(); 
        const month = date.getMonth();   

        monthYearText.innerHTML = `📅 ${year}년 ${month + 1}월`;

        const dayNamesHtml = `
            <div class="day-name">일</div><div class="day-name">월</div><div class="day-name">화</div>
            <div class="day-name">수</div><div class="day-name">목</div><div class="day-name">금</div><div class="day-name">토</div>
        `;
        calendarGrid.innerHTML = dayNamesHtml;

        const firstDay = new Date(year, month, 1).getDay(); 
        const lastDate = new Date(year, month + 1, 0).getDate(); 

        for (let i = 0; i < firstDay; i++) {
            calendarGrid.innerHTML += `<div class="day empty"></div>`;
        }

        const today = new Date();
        for (let i = 1; i <= lastDate; i++) {
            let isToday = (year === today.getFullYear() && month === today.getMonth() && i === today.getDate()) ? 'today' : '';
            
            const dateKey = `${year}-${month}-${i}`; 
            let eventHtml = '';
            
            // ⭐️ 일정이 있을 때, 일정 글자와 수정/삭제 버튼을 함께 만들어 줍니다.
            if (savedEvents[dateKey]) {
                savedEvents[dateKey].forEach((eventText, index) => {
                    eventHtml += `
                        <div class="event" onclick="event.stopPropagation()">
                            <span class="event-text">${eventText}</span>
                            <div class="event-buttons">
                                <button class="action-btn" onclick="editEvent('${dateKey}', ${index}, event)">수정</button>
                                <button class="action-btn" onclick="deleteEvent('${dateKey}', ${index}, event)">삭제</button>
                            </div>
                        </div>
                    `;
                });
            }

            calendarGrid.innerHTML += `
                <div class="day ${isToday}" onclick="addEvent(${year}, ${month}, ${i})">
                    <span class="day-number" style="color: ${new Date(year, month, i).getDay() === 0 ? '#e74c3c' : (new Date(year, month, i).getDay() === 6 ? '#4a90e2' : '#555')}">${i}</span>
                    ${eventHtml}
                </div>
            `;
        }
    }

    // ➕ 일정 추가 기능
    window.addEvent = function(year, month, day) {
        const eventText = prompt(`${month + 1}월 ${day}일에 추가할 일정을 입력하세요:`);
        if (eventText && eventText.trim() !== "") { 
            const dateKey = `${year}-${month}-${day}`;
            if (!savedEvents[dateKey]) savedEvents[dateKey] = []; 
            savedEvents[dateKey].push(eventText); 
            localStorage.setItem('myEvents', JSON.stringify(savedEvents)); 
            renderCalendar(currentDate); 
        }
    };

    // ✏️ 일정 수정 기능 (새로 추가됨!)
    window.editEvent = function(dateKey, index, e) {
        e.stopPropagation(); // 버튼 눌렀을 때 배경(날짜칸)이 눌리는 것 방지
        const currentText = savedEvents[dateKey][index]; // 기존 글자 가져오기
        const newText = prompt("일정을 수정하세요:", currentText); // 수정할 창 띄우기
        
        if (newText !== null && newText.trim() !== "") {
            savedEvents[dateKey][index] = newText; // 새 글자로 덮어쓰기
            localStorage.setItem('myEvents', JSON.stringify(savedEvents)); // 저장
            renderCalendar(currentDate); // 새로고침
        }
    };

    // ❌ 일정 삭제 기능
    window.deleteEvent = function(dateKey, index, e) {
        e.stopPropagation(); 
        const eventText = savedEvents[dateKey][index];
        if (confirm(`'${eventText}' 일정을 정말 삭제하시겠습니까?`)) {
            savedEvents[dateKey].splice(index, 1); 
            localStorage.setItem('myEvents', JSON.stringify(savedEvents)); 
            renderCalendar(currentDate); 
        }
    };

    renderCalendar(currentDate);

    prevBtn.addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(currentDate); });
    nextBtn.addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(currentDate); });
</script>

</body>
</html>
