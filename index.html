<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>수행평가 알리미</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f9f9f9; }
        .card { background: white; padding: 20px; border-radius: 10px; width: 300px; margin: 0 auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 24px; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #eee; }
        .date { color: #e74c3c; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>📅 우리 반 수행평가</h1>
        <p>미리미리 준비해서 A+ 받자!</p>

        <ul>
            <li>
                <strong>국어: 독후감 제출</strong><br>
                <span class="date">마감일: 4월 15일</span>
            </li>
            <li>
                <strong>수학: 단원 평가 준비</strong><br>
                <span class="date">마감일: 4월 18일</span>
            </li>
        </ul>
    </div>

</body>
</html>
