<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수행평가 달력</title>
    <style>
        :root { --bg-color: #f4f7f6; --card-bg: #ffffff; --primary-color: #4a90e2; --accent-color: #e74c3c; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; }
        .calendar-container { background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px; }
        .calendar-header { text-align: center; margin-bottom: 20px; }
        .calendar-header h1 { font-size: 1.5rem; color: #333; margin: 0; }
        
        /* 달력 그리드 설정 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-name { text-align: center; font-weight: bold; font-size: 0.8rem; color: #888; padding-bottom: 10px; }
        .day { background: #fff; border: 1px solid #eee; min-height: 80px; padding: 5px; border-radius: 5px; position: relative; }
        .day.today { background: #eef5ff; border: 2px solid var(--primary-color); }
        .day-number { font-size: 0.9rem; font-weight: bold; color: #555; }

        /* 수행평가 일정 스타일 */
        .event { font-size: 0.7rem; padding: 2px 4px; border-radius: 3px; margin-top: 3px; color: white; line-height: 1.2; }
        .event.blue { background-color: #4a90e2; }
        .event.red { background-color: #e74c3c; }
        .event.green { background-color: #2ecc71; }

        /* 주말 색상 */
        .day-name:nth-child(1), .day:nth-child(7n+1) .day-number { color: #e74c3c; } /* 일요일 */
        .day-name:nth-child(7), .day:nth-child(7n) .day-number { color: #4a90e2; } /* 토요일 */
    </style>
</head>
<body>

<div class="calendar-container">
    <div class="calendar-header">
        <h1>📅 2024년 4월 수행평가</h1>
    </div>

    <div class="calendar-grid">
        <div class="day-name">일</div><div class="day-name">월</div><div class="day-name">화</div>
        <div class="day-name">수</div><div class="day-name">목</div><div class="day-name">금</div><div class="day-name">토</div>

        <div class="day"></div> 
        
        <div class="day"><span class="day-number">1</span></div>
        <div class="day"><span class="day-number">2</span></div>
        <div class="day"><span class="day-number">3</span></div>
        <div class="day"><span class="day-number">4</span></div>
        <div class="day"><span class="day-number">5</span>
            <div class="event blue">국어 독후감</div>
        </div>
        <div class="day"><span class="day-number">6</span></div>
        
        <div class="day"><span class="day-number">7</span></div>
        <div class="day"><span class="day-number">8</span></div>
        <div class="day"><span class="day-number">9</span></div>
        <div class="day"><span class="day-number">10</span></div>
        <div class="day"><span class="day-number">11</span></div>
        <div class="day"><span class="day-number">12</span>
            <div class="event red">수학 단원평가</div>
        </div>
        <div class="day"><span class="day-number">13</span></div>

        <div class="day"><span class="day-number">14</span></div>
        <div class="day today"><span class="day-number">15</span>
            <div class="event green">과학 실험보고서</div>
        </div>
        <div class="day"><span class="day-number">16</span></div>
        <div class="day"><span class="day-number">17</span></div>
        <div class="day"><span class="day-number">18</span></div>
        <div class="day"><span class="day-number">19</span></div>
        <div class="day"><span class="day-number">20</span></div>
        </div>
</div>

</body>
</html>
